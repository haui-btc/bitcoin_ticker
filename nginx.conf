server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Compress text assets on the fly.
    gzip            on;
    gzip_types      text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    # HTML is tiny and changes often — never cache it.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # CSS/JS — cache briefly; bump the filename or redeploy to bust it.
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
